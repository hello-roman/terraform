#cloud-config
package_update: true
packages:
  - docker.io
  - docker-compose

runcmd:
  - systemctl enable docker
  - systemctl start docker

  - mkdir -p /opt/app
  - cd /opt/app

  - |
    cat <<EOF > docker-compose.yml
    version: '3'
    services:
      app:
        image: nginx:latest
        ports:
          - "80:80"
        environment:
          - DB_HOST=${DB_HOST}
          - DB_USER=${DB_USER}
          - DB_PASSWORD=${DB_PASSWORD}
    EOF

  - docker-compose up -d
